[pytest]
# ============================================================================
# CRS Strategy Testing Configuration - Enterprise Grade
# ============================================================================
# Following industry best practices from:
# - Google Testing Blog (https://testing.googleblog.com/)
# - Microsoft Azure DevOps Testing Standards
# - Python Testing Best Practices (pytest.org)
# ============================================================================

# ----------------------------------------------------------------------------
# Test Discovery Configuration
# ----------------------------------------------------------------------------
python_files = test_*.py *_test.py
python_classes = Test* *Tests
python_functions = test_*
testpaths = tests

# ----------------------------------------------------------------------------
# Minimum Requirements
# ----------------------------------------------------------------------------
minversion = 7.0

# ----------------------------------------------------------------------------
# Python Path Configuration
# ----------------------------------------------------------------------------
pythonpath = .

# ----------------------------------------------------------------------------
# Console Output & Reporting
# ----------------------------------------------------------------------------
console_output_style = progress

addopts =
    # Verbosity and detailed output
    -v
    --tb=short
    -l
    -ra
    --strict-markers
    --strict-config

    # Warnings configuration
    -W default

    # Coverage configuration (requires pytest-cov)
    --cov=common
    --cov=core
    --cov=strategies
    --cov-branch
    --cov-report=term-missing:skip-covered
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=80

    # Performance tracking
    --durations=10
    --maxfail=5

    # Output capture
    --show-capture=all

# ----------------------------------------------------------------------------
# Test Markers (Enterprise-level categorization)
# ----------------------------------------------------------------------------
markers =
    # Test Levels (Pyramid: Unit > Integration > E2E)
    unit: Unit tests - isolated function/method testing
    integration: Integration tests - component interaction testing
    regression: Regression tests - old vs new implementation equivalence

    # Test Characteristics
    slow: Tests taking >5 seconds (excluded in fast CI runs)
    fast: Tests completing in <1 second
    smoke: Quick smoke tests for basic functionality

    # External Dependencies (for conditional test execution)
    requires_llm: Tests requiring actual LLM API calls
    requires_docker: Tests requiring Docker daemon
    requires_network: Tests requiring network access

    # Component-specific markers
    prompt: Prompt generation tests
    config: Configuration management tests
    utils: Utility function tests
    strategy: Strategy implementation tests
    xs0: XS0 strategy specific tests
    as0: AS0 strategy specific tests

    # Priority levels (for triage)
    critical: Must-pass tests for deployment
    high: High priority tests
    medium: Medium priority tests
    low: Low priority tests

# ----------------------------------------------------------------------------
# Logging Configuration
# ----------------------------------------------------------------------------
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] [%(name)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] [%(name)s:%(lineno)d] %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# ----------------------------------------------------------------------------
# Timeout Configuration (requires pytest-timeout)
# ----------------------------------------------------------------------------
timeout = 300
timeout_method = thread
timeout_func_only = true

# ----------------------------------------------------------------------------
# Directory Exclusions
# ----------------------------------------------------------------------------
norecursedirs =
    .git
    .tox
    .eggs
    *.egg-info
    dist
    build
    docs
    __pycache__
    .pytest_cache
    .coverage
    htmlcov
    node_modules

    # Legacy code (not under test)
    jeff

    # Generated/temporary files
    logs
    *.log
    .env
    venv
    env

    # Analysis directories
    analysis
    code_analysis

# ----------------------------------------------------------------------------
# Warning Filters
# ----------------------------------------------------------------------------
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# ============================================================================
# Coverage Configuration (pytest-cov integration)
# ============================================================================
[coverage:run]
source =
    common
    core
    strategies

omit =
    */tests/*
    */test_*
    *_test.py
    */jeff/*
    */__pycache__/*
    */.*
    */venv/*
    */env/*
    setup.py
    conftest.py

branch = True
parallel = True

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
skip_empty = True

# Exclude common patterns from coverage
exclude_lines =
    # Standard pragma
    pragma: no cover

    # Don't complain about debug code
    def __repr__
    def __str__

    # Don't complain about defensive code
    raise AssertionError
    raise NotImplementedError

    # Don't complain about non-runnable code
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    if typing.TYPE_CHECKING:

    # Don't complain about abstract methods
    @abstractmethod
    @abc.abstractmethod

[coverage:html]
directory = htmlcov
title = CRS Strategy Test Coverage Report

[coverage:xml]
output = coverage.xml

# ============================================================================
# Tool Integration
# ============================================================================
[tool:pytest]
junit_family = xunit2
junit_suite_name = CRS Strategy Tests
