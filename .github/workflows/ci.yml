name: CI - Tests

on:
  push:
    branches:
      - main
      - dev
      - develop
  pull_request:
    branches:
      - main
      - dev
      - develop

jobs:
  # ============================================================================
  # Python Tests
  # ============================================================================
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: 'crs/strategy/requirements-test.txt'

    - name: Install dependencies
      run: |
        cd crs/strategy
        pip install -r requirements.txt
        pip install -r requirements-test.txt

    - name: Run Python unit tests
      run: |
        cd crs/strategy
        pytest tests/unit/ -v --cov --cov-report=xml --cov-report=term
      continue-on-error: true

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      if: always()
      with:
        files: ./crs/strategy/coverage.xml
        flags: python
        name: python-coverage
      continue-on-error: true

  # ============================================================================
  # Go Tests
  # ============================================================================
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache-dependency-path: |
          crs/go.sum
          static-analysis/go.sum

    - name: Run Go tests (crs)
      run: |
        cd crs
        go test ./... -v -race -coverprofile=coverage.out
      continue-on-error: true

    - name: Run Go tests (static-analysis)
      run: |
        cd static-analysis
        go test ./... -v
      continue-on-error: true

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      if: always()
      with:
        files: ./crs/coverage.out
        flags: go
        name: go-coverage
      continue-on-error: true

  # ============================================================================
  # Code Quality Checks
  # ============================================================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install Python linting tools
      run: |
        pip install flake8 black

    - name: Run Python linters
      run: |
        cd crs/strategy
        flake8 common core strategies --max-line-length=120 --extend-ignore=E203,W503
      continue-on-error: true

    - name: Run Go linters
      run: |
        cd crs && go vet ./...
        cd ../static-analysis && go vet ./...
      continue-on-error: true

  # ============================================================================
  # Summary Job (required for branch protection)
  # ============================================================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [python-tests, go-tests]
    if: always()

    steps:
    - name: Check test results
      run: |
        echo "Python Tests: ${{ needs.python-tests.result }}"
        echo "Go Tests: ${{ needs.go-tests.result }}"
        echo "CI pipeline completed (tests allowed to fail for now)"
        exit 0
