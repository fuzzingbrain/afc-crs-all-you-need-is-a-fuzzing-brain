name: FuzzingBrain v2 CI

on:
  push:
    paths:
      - 'FuzzingBrain-v2/v2/**'
      - '.github/workflows/v2-ci.yml'
    branches:
      - dev
      - main
      - 'feature/**'
      - 'refactor/**'
      - 'fix/**'
  pull_request:
    paths:
      - 'FuzzingBrain-v2/v2/**'
      - '.github/workflows/v2-ci.yml'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FuzzingBrain-v2/v2

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: |
          ruff check fuzzingbrain/ --output-format=github

      - name: Run ruff format check
        run: |
          ruff format fuzzingbrain/ --check --diff

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FuzzingBrain-v2/v2

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest mongomock

      - name: Run tests
        run: python -m pytest tests/ -v
        env:
          PYTHONPATH: .
