name: Fast Tests (Unit Only)

on:
  push:
    branches-ignore:
      - main
      - dev
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ============================================================================
  # Quick Feedback - Go Tests Only (crs)
  # ============================================================================
  fast-tests:
    name: Fast Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Run Go tests (short mode, crs only)
      run: |
        cd crs
        go test ./... -short -v
