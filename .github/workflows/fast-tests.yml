name: Fast Tests (Unit Only)

on:
  push:
    branches-ignore:
      - main
      - dev
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ============================================================================
  # Quick Feedback - Unit Tests Only
  # ============================================================================
  fast-tests:
    name: Fast Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: 'crs/strategy/requirements-test.txt'

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install Python dependencies
      run: |
        cd crs/strategy
        pip install -r requirements.txt
        pip install -r requirements-test.txt

    - name: Run Python unit tests (fast)
      run: |
        cd crs/strategy
        pytest -m "unit and not slow" -v --tb=short
      continue-on-error: true

    - name: Run Go tests (short mode)
      run: |
        cd crs
        go test ./... -short -v
      continue-on-error: true
